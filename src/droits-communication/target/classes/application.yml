spring:
  application:
    name: droits-communication

  # Profil par défaut en H2 (dev). Profil `local` (PostgreSQL) ci-dessous + profil `postgres`.
  # H2 en mode natif (pas MODE=PostgreSQL) : nécessaire pour le type TINYINT des
  # colonnes REVTYPE des tables d'audit Envers (_AUD). Sur PostgreSQL le dialecte le mappe.
  datasource:
    url: jdbc:h2:mem:droitsdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # Flyway désactivé en dev H2 (schéma géré par Hibernate). Activé sur PostgreSQL.
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: false

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          batch_size: 20
        # Configuration Hibernate Envers pour l'audit
        org.hibernate.envers.audit_table_suffix: _AUD
        org.hibernate.envers.revision_field_name: REV
        org.hibernate.envers.revision_type_field_name: REVTYPE
        org.hibernate.envers.store_data_at_delete: true
    show-sql: false

  # Spring Batch : ne pas exécuter de job au démarrage (lancés à la demande),
  # et créer les tables techniques du JobRepository (dev/H2).
  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: always

  h2:
    console:
      enabled: true
      path: /h2-console

# --- Sécurité (mock en dev / oauth en prod) ---
qf:
  security:
    auth-mode: mock   # mock | oauth
    public-endpoints:
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /actuator/**
      - /error
      - /favicon.ico
      - /h2-console/**
  integration:
    internal:
      documents:
        base-url: http://localhost:8090
      adminconsole:
        base-url: http://localhost:8091
    external:
      sab-referential:
        base-url: ${APIGEE_BASE_URL}/referential/v1/01
        token-url: ${APIGEE_TOKEN_URL}
        username: ${APIGEE_BASIC_USERNAME}
        password: ${APIGEE_BASIC_PASSWORD}
      camunda:
        token-url: ${APIGEE_TOKEN_URL}
        username: ${APIGEE_BASIC_USERNAME}
        password: ${APIGEE_BASIC_PASSWORD}
        base-url: ${APIGEE_BASE_URL}/engine-rest
        tenant-id: DROITS_COMMUNICATION
        process-definition-keys:
          - DC_DROIT_COMMUNICATION
        external-tasks:
          worker-id: droits-communication-worker
          max-tasks: 10
          async-response-timeout: 5000
          subscriptions:
            dc_update_status:
              enabled: true
              topic-name: dc_update_status
              lock-duration: 30000

# --- Paramétrage métier interne (batch SAB) ---
app:
  sab:
    batch:
      chunk-size: 100      # nb de clients envoyés à SAB par lot

# Variables APIGEE (valeurs par défaut dev, surchargées par l'environnement)
CODE_APP: DC0001
APIGEE_BASE_URL: http://localhost:3030
APIGEE_TOKEN_URL: http://localhost:3030/auth/oauth/v2/token
APIGEE_BASIC_USERNAME: changeme
APIGEE_BASIC_PASSWORD: changeme

server:
  port: 8080

logging:
  level:
    root: info
    org.springframework: info
    org.hibernate.SQL: info

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health,info

---
# Profil PostgreSQL (à activer avec spring.profiles.active=postgres)
spring:
  config:
    activate:
      on-profile: postgres
  datasource:
    url: jdbc:postgresql://localhost:5432/droits_communication
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
