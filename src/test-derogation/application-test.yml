package facade;
// ⚠️ Garde le package que TU utilises pour tes tests de facade.
// IMPORTS À AJUSTER (Alt+Entrée) :
// - CoreBankingFacade (package wfdtrp.facade)
// - GestionDesTiersApi + ApiException + Account : classes générées — laisse IntelliJ
//   trouver les bons packages (probablement services.*.client.api / .invoker / .model)
// - ClientSabDTO, AccountDTO, DeviseDTO (package wfdtrp.dto)

import com.bnpparibas.irb.qlickflow.wfdtrp.dto.AccountDTO;
import com.bnpparibas.irb.qlickflow.wfdtrp.dto.ClientSabDTO;
import com.bnpparibas.irb.qlickflow.wfdtrp.dto.DeviseDTO;
import com.bnpparibas.irb.qlickflow.wfdtrp.facade.CoreBankingFacade;

import org.junit.jupiter.api.Test;
import org.junit.jupiter.api.extension.ExtendWith;
import org.mockito.Answers;
import org.mockito.InjectMocks;
import org.mockito.Mock;
import org.mockito.junit.jupiter.MockitoExtension;
import org.mockito.junit.jupiter.MockitoSettings;
import org.mockito.quality.Strictness;

import java.util.List;

import static org.assertj.core.api.Assertions.assertThat;
import static org.assertj.core.api.Assertions.assertThatThrownBy;
import static org.mockito.Mockito.RETURNS_DEEP_STUBS;
import static org.mockito.Mockito.mock;
import static org.mockito.Mockito.when;

/**
 * Astuce : l'API est mockée en RETURNS_DEEP_STUBS, ce qui permet de stubber des chaînes
 * comme api.getClientInfosByIdClient(...).getBusinessLinkName().getFirstName() SANS
 * connaître les types générés intermédiaires.
 */
@ExtendWith(MockitoExtension.class)
@MockitoSettings(strictness = Strictness.LENIENT)
class CoreBankingFacadeTest {

    @Mock(answer = Answers.RETURNS_DEEP_STUBS)
    private GestionDesTiersApi gestionDesTiersApi;

    @InjectMocks
    private CoreBankingFacade facade;

    /** RIB marocain valide : 24 caractères = banque(3) + ville(3) + compte(16) + clé(2). */
    private static final String RIB_VALIDE = "011780" + "1000000023456789" + "23";

    private void stubClientInfo(String sabId) throws Exception {
        when(gestionDesTiersApi.getClientInfosByIdClient("01", sabId)
                .getBusinessLinkName().getFirstName()).thenReturn("Ahmed");
        when(gestionDesTiersApi.getClientInfosByIdClient("01", sabId)
                .getBusinessLinkName().getLastName()).thenReturn("El Amrani");
        when(gestionDesTiersApi.getClientInfosByIdClient("01", sabId)
                .getBusinessLinkType()).thenReturn("RET");
        when(gestionDesTiersApi.getClientInfosByIdClient("01", sabId)
                .getDetailedClientCategory()).thenReturn("GRP");
    }

    // ------------------------------------------------------------------
    // getClientInfo — branche SANS comptes (accountsResp null)
    // ------------------------------------------------------------------

    @Test
    void getClientInfo_withoutAccounts_mapsClientFieldsOnly() throws Exception {
        stubClientInfo("0406102");
        when(gestionDesTiersApi.getAccountsBySabId("01", "0406102")).thenReturn(null);

        ClientSabDTO dto = facade.getClientInfo("0406102");

        assertThat(dto.getSubId()).isEqualTo("0406102");
        assertThat(dto.getFirstName()).isEqualTo("Ahmed");
        assertThat(dto.getLastName()).isEqualTo("El Amrani");
        assertThat(dto.getBusinessLine()).isEqualTo("RET");
        assertThat(dto.getSegment()).isEqualTo("GRP");
        assertThat(dto.getAccountList()).isNull(); // branche if non exécutée
        assertThat(dto.getDevises()).isNull();
    }

    @Test
    void getClientInfo_emptyAccountsList_skipsAccountMapping() throws Exception {
        stubClientInfo("0406102");
        when(gestionDesTiersApi.getAccountsBySabId("01", "0406102").getAccounts())
                .thenReturn(List.of()); // branche isEmpty()

        ClientSabDTO dto = facade.getClientInfo("0406102");

        assertThat(dto.getSubId()).isEqualTo("0406102");
        assertThat(dto.getAccountList()).isNull();
    }

    // ------------------------------------------------------------------
    // getClientInfo — branche AVEC comptes (filtres, RIB, devises)
    // ------------------------------------------------------------------

    @Test
    void getClientInfo_withAccounts_mapsAccountsAndCurrencies() throws Exception {
        stubClientInfo("0406102");

        // Compte valide : agreement + bankDetails + RIB 24 chars + devise MAD
        // ⚠️ TODO : "Account" = nom de la classe générée des éléments de getAccounts()
        // (laisse IntelliJ importer le bon package)
        Account compteOk = mock(Account.class, RETURNS_DEEP_STUBS);
        when(compteOk.getAccountAgreementDetails().getBankDetails()
                .getBasicBankAccountNumber()).thenReturn(RIB_VALIDE);
        when(compteOk.getAccountCurrency().getShortName()).thenReturn("MAD");
        when(compteOk.getAccountCurrency().getLabel()).thenReturn("Dirham marocain");

        // Compte avec RIB au mauvais format → branche warn + accountNumber null
        Account compteRibInvalide = mock(Account.class, RETURNS_DEEP_STUBS);
        when(compteRibInvalide.getAccountAgreementDetails().getBankDetails()
                .getBasicBankAccountNumber()).thenReturn("123");
        when(compteRibInvalide.getAccountCurrency().getShortName()).thenReturn("EUR");
        when(compteRibInvalide.getAccountCurrency().getLabel()).thenReturn("Euro");

        // Compte sans agreementDetails → filtré de la liste des comptes
        // (mais sa devise est conservée dans la liste des devises)
        Account compteSansAgreement = mock(Account.class, RETURNS_DEEP_STUBS);
        when(compteSansAgreement.getAccountAgreementDetails()).thenReturn(null);
        when(compteSansAgreement.getAccountCurrency().getShortName()).thenReturn("USD");
        when(compteSansAgreement.getAccountCurrency().getLabel()).thenReturn("Dollar américain");

        when(gestionDesTiersApi.getAccountsBySabId("01", "0406102").getAccounts())
                .thenReturn(List.of(compteOk, compteRibInvalide, compteSansAgreement));

        ClientSabDTO dto = facade.getClientInfo("0406102");

        // comptes : seuls les 2 avec agreement+bankDetails passent le filtre
        assertThat(dto.getAccountList()).hasSize(2);
        AccountDTO accountOk = dto.getAccountList().get(0);
        // extraction depuis le RIB : substring(6, length-2) = le numéro de compte sur 16 positions
        // ⚠️ TODO : ajuster si extractAccountNumberFromRib découpe différemment
        assertThat(accountOk.getAccountNumber()).isEqualTo("1000000023456789");
        assertThat(accountOk.getAccountCurrency()).isEqualTo("MAD");
        // RIB invalide → accountNumber null (branche warn de extractAccountNumberFromRib)
        assertThat(dto.getAccountList().get(1).getAccountNumber()).isNull();

        // devises : les 3 comptes ont une devise
        assertThat(dto.getDevises())
                .extracting(DeviseDTO::getCode)
                .containsExactly("MAD", "EUR", "USD");
        assertThat(dto.getDevises().get(0).getLibelle()).isEqualTo("Dirham marocain");
    }

    // ------------------------------------------------------------------
    // getClientInfo — ApiException → RuntimeException
    // ------------------------------------------------------------------

    @Test
    void getClientInfo_apiException_wrapsInRuntimeException() throws Exception {
        // ⚠️ TODO : si ApiException n'a pas de ctor (String), utiliser new ApiException()
        when(gestionDesTiersApi.getClientInfosByIdClient("01", "999"))
                .thenThrow(new ApiException("SAB indisponible"));

        assertThatThrownBy(() -> facade.getClientInfo("999"))
                .isInstanceOf(RuntimeException.class);
    }

    // ------------------------------------------------------------------
    // getSimulatedClientBySabId
    // ------------------------------------------------------------------

    @Test
    void getSimulatedClientBySabId_emptyMap_returnsNull() {
        assertThat(facade.getSimulatedClientBySabId("0406102")).isNull();
    }
}

sonar.projectName=p-6411-derog-tar-retail-ci
sonar.projectVersion=1.0
sonar.sources=src/main
sonar.tests=src/test
sonar.exclusions=**/tmp-secops-services/**,**/component_scripts/**,**/pipeline/**,pom.xml
sonar.sourceEncoding=UTF-8
sonar.java.binaries=target

# === AJOUTS COUVERTURE ===
# Indique à Sonar où lire le rapport JaCoCo (format XML, le seul accepté par les versions récentes)
sonar.coverage.jacoco.xmlReportPaths=target/jacoco/jacoco.xml

# Exclut du calcul de couverture ce qu'on a exclu dans JaCoCo (sinon Sonar les compte à 0%)
sonar.coverage.exclusions=**/bpm/outbox/**,**/audit/**,**/config/**,**/integration/**,**/observability/**,**/common/logging/**,**/*Application.java,**/TaskSyncCronJob.java

server:
  port: 0

spring:
  application:
    name: Qlickflow - DTRP Workflow (TEST)

  datasource:
    # MODE=PostgreSQL : compatibilité avec columnDefinition = "uuid" et la syntaxe PG
    # Si erreur sur la colonne "package" (dtrp_derog_requests), ajouter ;NON_KEYWORDS=PACKAGE
    url: jdbc:h2:mem:qlickflow;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    # Les migrations sont écrites pour PostgreSQL → on les désactive sur H2,
    # c'est Hibernate qui génère le schéma (y compris les tables _AUD d'Envers)
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop   # remplace "validate" de la prod
    show-sql: false
    properties:
      hibernate:
        format_sql: false
      # Configuration Envers identique à la prod pour que les tables _AUD
      # soient générées avec les mêmes noms
      org:
        hibernate:
          envers:
            audit_table_suffix: _AUD
            revision_field_name: REV
            revision_type_field_name: REVTYPE
            store_data_at_delete: true

  cloud:
    vault:
      enabled: false

# Sécurité en mode mock comme en local
qf:
  security:
    auth-mode: mock
    public-endpoints:
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /actuator/**
      - /error
      - /favicon.ico

# Désactiver le cron de sync Camunda pendant les tests
# (la propriété pilotant @Scheduled fixedDelayString="${wf.task.sync.fixedDelay:5000}"
#  ne peut pas être désactivée par valeur — si un test charge le contexte complet,
#  préférer @MockBean TaskSyncCronJob ou exclure le bean)
wf:
  task:
    sync:
      fixedDelay: 2147483647   # ~24 jours : le cron ne tournera jamais pendant un test

# Outbox : valeurs minimales si un slice de contexte les exige
outbox:
  node-id: test-node
  polling-enabled: false
  recovery-enabled: false

logging:
  level:
    root: warn
    org.hibernate.SQL: warn


 <!-- jacoco -->
<!-- jacoco -->
<plugin>
    <groupId>org.jacoco</groupId>
    <artifactId>jacoco-maven-plugin</artifactId>
    <version>0.8.9</version>
    <!-- ▼▼▼ SEUL AJOUT : exclusions du code généré et framework ▼▼▼ -->
    <configuration>
        <excludes>
            <!-- Clients API générés (openapi-generator) -->
            <exclude>com/bnpparibas/irb/qlickflow/services/**</exclude>
            <exclude>com/bnpparibas/irb/qlickflow/adminconsole/**</exclude>
            <exclude>com/bnpparibas/irb/qlickflow/documents/**</exclude>
            <!-- Framework outbox interne -->
            <exclude>com/bnpparibas/irb/qlickflow/bpm/outbox/**</exclude>
            <!-- Classe d'application + technique -->
            <exclude>**/QlickflowWfDTRPApplication.class</exclude>
            <exclude>com/bnpparibas/irb/qlickflow/wfdtrp/config/**</exclude>
            <exclude>com/bnpparibas/irb/qlickflow/wfdtrp/integration/**</exclude>
        </excludes>
    </configuration>
    <!-- ▲▲▲ FIN DE L'AJOUT ▲▲▲ -->
    <executions>
        <execution>
            <id>pre-unit-test</id>
            <goals>
                <goal>prepare-agent</goal>
            </goals>
            <configuration>
                <destFile>${sonar.jacoco.reportPath}</destFile>
            </configuration>
        </execution>
        <execution>
            <id>post-unit-test</id>
            <phase>test</phase>
            <goals>
                <goal>report</goal>
            </goals>
            <configuration>
                <dataFile>${sonar.jacoco.reportPath}</dataFile>
                <outputDirectory>${sonar.jacoco.outReportPath}</outputDirectory>
            </configuration>
        </execution>
        <execution>
            <id>pre-integration-test</id>
            <phase>pre-integration-test</phase>
            <goals>
                <goal>prepare-agent</goal>
            </goals>
            <configuration>
                <destFile>${sonar.jacoco.itReportPath}</destFile>
            </configuration>
        </execution>
        <execution>
            <id>jacoco-site</id>
            <phase>verify</phase>
            <goals>
                <goal>report</goal>
            </goals>
            <configuration>
                <dataFile>${sonar.jacoco.itReportPath}</dataFile>
                <outputDirectory>${sonar.jacoco.outItReportPath}</outputDirectory>
            </configuration>
        </execution>
    </executions>
</plugin>
