@Test
void handleDateValidationException_returns422() {
    HttpServletRequest request = mock(HttpServletRequest.class);
    when(request.getRequestURI()).thenReturn("/api/derogations");

    var response = handler.handleDateValidationException(request,
            new DateValidationException("La date de fin doit être postérieure"));

    assertThat(response.getStatusCode()).isEqualTo(HttpStatus.UNPROCESSABLE_ENTITY);
    assertThat(response.getBody().getMessage()).contains("postérieure");
}

