        <execution>
            <id>jacoco-site</id>
            <phase>verify</phase>
            <goals>
                <goal>report</goal>
            </goals>
            <configuration>
                <dataFile>${sonar.jacoco.itReportPath}</dataFile>
                <outputDirectory>${sonar.jacoco.outItReportPath}</outputDirectory>
            </configuration>
        </execution>
    </executions>
</plugin>
