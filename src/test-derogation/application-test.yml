package com.bnpparibas.irb.droitscommunication.mapper;

import com.bnpparibas.irb.droitscommunication.TestFixtures;
import com.bnpparibas.irb.droitscommunication.dto.DroitCommunicationRequest;
import com.bnpparibas.irb.droitscommunication.dto.DroitCommunicationResponse;
import com.bnpparibas.irb.droitscommunication.entity.DroitCommunicationEntity;
import org.junit.jupiter.api.Test;
import org.mapstruct.factory.Mappers;

import static org.assertj.core.api.Assertions.assertThat;

/**
 * Vérifie le mapping généré par MapStruct (impl réelle, pas un mock).
 */
class DroitCommunicationMapperTest {

    private final DroitCommunicationMapper mapper =
            Mappers.getMapper(DroitCommunicationMapper.class);

    @Test
    void toEntity_devrait_copier_les_champs_et_ignorer_le_suivi() {
        DroitCommunicationRequest request = TestFixtures.request();

        DroitCommunicationEntity entity = mapper.toEntity(request);

        assertThat(entity.getOrganisme()).isEqualTo("DGFIP");
        assertThat(entity.getCanalDemande()).isEqualTo(request.canalDemande());
        assertThat(entity.getTypesDemande()).isEqualTo(request.typesDemande());
        assertThat(entity.getDocumentReference()).isEqualTo("doc-uuid-123");
        // Champs de suivi ignorés à la création
        assertThat(entity.getId()).isNull();
        assertThat(entity.getStatut()).isNull();
        assertThat(entity.getDateCreation()).isNull();
    }

    @Test
    void toResponse_devrait_copier_tous_les_champs() {
        DroitCommunicationEntity entity = TestFixtures.entity();

        DroitCommunicationResponse response = mapper.toResponse(entity);

        assertThat(response.id()).isEqualTo(1L);
        assertThat(response.organisme()).isEqualTo("DGFIP");
        assertThat(response.statut()).isEqualTo(entity.getStatut());
        assertThat(response.typesDemande()).isEqualTo(entity.getTypesDemande());
        assertThat(response.dateCreation()).isEqualTo(entity.getDateCreation());
    }

    // --- Couverture des branches défensives générées par MapStruct ---

    @Test
    void toEntity_devrait_retourner_null_si_request_null() {
        assertThat(mapper.toEntity(null)).isNull();
    }

    @Test
    void toResponse_devrait_retourner_null_si_entity_null() {
        assertThat(mapper.toResponse(null)).isNull();
    }

    @Test
    void toEntity_devrait_gerer_typesDemande_null() {
        // Couvre la branche "set == null" de toEntity (ligne if (set != null)).
        DroitCommunicationRequest request = new DroitCommunicationRequest(
                "DGFIP", "12 rue de la Paix", "BAT", "Objet",
                com.bnpparibas.irb.droitscommunication.enums.CanalDemande.COURRIER,
                "REF-1", java.time.LocalDate.of(2026, 6, 20),
                null,                    // typesDemande null
                "doc-1", "f.pdf", "application/pdf");

        DroitCommunicationEntity entity = mapper.toEntity(request);

        assertThat(entity.getTypesDemande()).isNull();
    }

    @Test
    void toResponse_devrait_gerer_typesDemande_null() {
        // Couvre la branche "set == null" de toResponse.
        DroitCommunicationEntity entity = TestFixtures.entity();
        entity.setTypesDemande(null);

        DroitCommunicationResponse response = mapper.toResponse(entity);

        assertThat(response.typesDemande()).isNull();
    }
}


server:
  port: 0

spring:
  application:
    name: Qlickflow - DTRP Workflow (TEST)

  datasource:
    # MODE=PostgreSQL : compatibilité avec columnDefinition = "uuid" et la syntaxe PG
    # Si erreur sur la colonne "package" (dtrp_derog_requests), ajouter ;NON_KEYWORDS=PACKAGE
    url: jdbc:h2:mem:qlickflow;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    # Les migrations sont écrites pour PostgreSQL → on les désactive sur H2,
    # c'est Hibernate qui génère le schéma (y compris les tables _AUD d'Envers)
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop   # remplace "validate" de la prod
    show-sql: false
    properties:
      hibernate:
        format_sql: false
      # Configuration Envers identique à la prod pour que les tables _AUD
      # soient générées avec les mêmes noms
      org:
        hibernate:
          envers:
            audit_table_suffix: _AUD
            revision_field_name: REV
            revision_type_field_name: REVTYPE
            store_data_at_delete: true

  cloud:
    vault:
      enabled: false

# Sécurité en mode mock comme en local
qf:
  security:
    auth-mode: mock
    public-endpoints:
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /actuator/**
      - /error
      - /favicon.ico

# Désactiver le cron de sync Camunda pendant les tests
# (la propriété pilotant @Scheduled fixedDelayString="${wf.task.sync.fixedDelay:5000}"
#  ne peut pas être désactivée par valeur — si un test charge le contexte complet,
#  préférer @MockBean TaskSyncCronJob ou exclure le bean)
wf:
  task:
    sync:
      fixedDelay: 2147483647   # ~24 jours : le cron ne tournera jamais pendant un test

# Outbox : valeurs minimales si un slice de contexte les exige
outbox:
  node-id: test-node
  polling-enabled: false
  recovery-enabled: false

logging:
  level:
    root: warn
    org.hibernate.SQL: warn


 <!-- jacoco -->
<!-- jacoco -->
<plugin>
    <groupId>org.jacoco</groupId>
    <artifactId>jacoco-maven-plugin</artifactId>
    <version>0.8.9</version>
    <!-- ▼▼▼ SEUL AJOUT : exclusions du code généré et framework ▼▼▼ -->
    <configuration>
        <excludes>
            <!-- Clients API générés (openapi-generator) -->
            <exclude>com/bnpparibas/irb/qlickflow/services/**</exclude>
            <exclude>com/bnpparibas/irb/qlickflow/adminconsole/**</exclude>
            <exclude>com/bnpparibas/irb/qlickflow/documents/**</exclude>
            <!-- Framework outbox interne -->
            <exclude>com/bnpparibas/irb/qlickflow/bpm/outbox/**</exclude>
            <!-- Classe d'application + technique -->
            <exclude>**/QlickflowWfDTRPApplication.class</exclude>
            <exclude>com/bnpparibas/irb/qlickflow/wfdtrp/config/**</exclude>
            <exclude>com/bnpparibas/irb/qlickflow/wfdtrp/integration/**</exclude>
        </excludes>
    </configuration>
    <!-- ▲▲▲ FIN DE L'AJOUT ▲▲▲ -->
    <executions>
        <execution>
            <id>pre-unit-test</id>
            <goals>
                <goal>prepare-agent</goal>
            </goals>
            <configuration>
                <destFile>${sonar.jacoco.reportPath}</destFile>
            </configuration>
        </execution>
        <execution>
            <id>post-unit-test</id>
            <phase>test</phase>
            <goals>
                <goal>report</goal>
            </goals>
            <configuration>
                <dataFile>${sonar.jacoco.reportPath}</dataFile>
                <outputDirectory>${sonar.jacoco.outReportPath}</outputDirectory>
            </configuration>
        </execution>
        <execution>
            <id>pre-integration-test</id>
            <phase>pre-integration-test</phase>
            <goals>
                <goal>prepare-agent</goal>
            </goals>
            <configuration>
                <destFile>${sonar.jacoco.itReportPath}</destFile>
            </configuration>
        </execution>
        <execution>
            <id>jacoco-site</id>
            <phase>verify</phase>
            <goals>
                <goal>report</goal>
            </goals>
            <configuration>
                <dataFile>${sonar.jacoco.itReportPath}</dataFile>
                <outputDirectory>${sonar.jacoco.outItReportPath}</outputDirectory>
            </configuration>
        </execution>
    </executions>
</plugin>
