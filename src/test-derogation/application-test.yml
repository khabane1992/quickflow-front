package com.bnpparibas.irb.qlickflow.wfdtrp.service.derogation.impl.filters;
// ⚠️ Package confirmé par le rapport JaCoCo : service.derogation.impl.filters
// PRÉREQUIS : src/test/resources/application-test.yml (déjà fourni) + h2 en scope test dans le pom.

import com.bnpparibas.irb.qlickflow.wfdtrp.bpm.WfTask;
import com.bnpparibas.irb.qlickflow.wfdtrp.bpm.WfTaskAssignment;
import com.bnpparibas.irb.qlickflow.wfdtrp.bpm.WfType;
import com.bnpparibas.irb.qlickflow.wfdtrp.entities.DerogationRequest;
import com.bnpparibas.irb.qlickflow.wfdtrp.entities.DerogationStatus;
import com.bnpparibas.irb.qlickflow.wfdtrp.entities.user.ProfileEnum;
import com.bnpparibas.irb.qlickflow.wfdtrp.entities.user.UserEntity;
import com.bnpparibas.irb.qlickflow.wfdtrp.repository.DerogationRequestRepository;
// TODO : ajuster les imports selon tes packages réels (WfTask/WfTaskAssignment/WfType notamment)

import org.junit.jupiter.api.BeforeEach;
import org.junit.jupiter.api.Test;
import org.springframework.beans.factory.annotation.Autowired;
import org.springframework.boot.test.autoconfigure.jdbc.AutoConfigureTestDatabase;
import org.springframework.boot.test.autoconfigure.orm.jpa.DataJpaTest;
import org.springframework.boot.test.autoconfigure.orm.jpa.TestEntityManager;
import org.springframework.test.context.ActiveProfiles;

import java.time.Instant;
import java.time.OffsetDateTime;
import java.util.LinkedHashSet;
import java.util.List;
import java.util.Set;

import static org.assertj.core.api.Assertions.assertThat;

/**
 * VAGUE 4 — Exécution RÉELLE des 3 Specifications JPA sur H2 (mode PostgreSQL).
 * C'est le seul moyen de couvrir le code Criteria (joins, subqueries, predicates).
 *
 * Si le schéma H2 échoue sur la colonne "package" (mot réservé), ajouter dans
 * l'URL JDBC de application-test.yml : ;NON_KEYWORDS=PACKAGE
 */
@DataJpaTest
@ActiveProfiles("test")
@AutoConfigureTestDatabase(replace = AutoConfigureTestDatabase.Replace.NONE)
class DerogationSearchFiltersTest {

    @Autowired
    private TestEntityManager em;
    @Autowired
    private DerogationRequestRepository repository;

    private UserEntity conseiller;   // utilisateur courant des scénarios
    private UserEntity collegue;     // autre utilisateur

    @BeforeEach
    void setUp() {
        conseiller = persistUser("conseiller1", ProfileEnum.CONSEILLER);
        collegue = persistUser("collegue1", ProfileEnum.DA);
    }

    // ------------------------------------------------------------------
    // Helpers de persistance
    // ------------------------------------------------------------------

    private UserEntity persistUser(String uid, ProfileEnum profile) {
        UserEntity u = UserEntity.builder()
                .uid(uid)
                .email(uid + "@bnpparibas.com")
                .firstName("First-" + uid)
                .lastName("Last-" + uid)
                .profile(profile)
                .build();
        return em.persist(u);
    }

    /** Crée et attache une WfTask (CREATED) assignée à `assignee` — devient la latestTask. */
    private WfTask attachTask(DerogationRequest derog, UserEntity assignee) {
        WfTaskAssignment assignment = WfTaskAssignment.builder()
                .assignee(assignee)
                .assignedBy(assignee)
                .assignedAt(Instant.now())
                .syncStatus(WfTaskAssignment.SyncStatus.CONFIRMED)
                .build();
        WfTask task = WfTask.builder()
                .status(WfTask.WfTaskStatus.CREATED)
                .name("Tâche")
                .createdAt(OffsetDateTime.now())
                .assignments(new LinkedHashSet<>())
                .build();
        assignment.setTask(task);
        task.getAssignments().add(assignment);
        task.setCurrentAssignment(assignment);
        derog.addTask(task); // pose tasks + latestTask + back-ref
        return task;
    }

    private DerogationRequest persistDerog(String businessKey, DerogationStatus status,
                                           UserEntity initiateur, UserEntity assignee) {
        DerogationRequest derog = DerogationRequest.builder()
                .wfType(WfType.DER_TAR_RET_PACK)
                .businessKey(businessKey)
                .status(status.name())
                .clientSubId("0406102")
                .firstName("Ahmed")
                .lastName("El Amrani")
                .agency("Agence Casa")
                .initiateur(initiateur)
                .commentaires(new java.util.ArrayList<>())
                .documentIds(new LinkedHashSet<>())
                .build();
        attachTask(derog, assignee);
        em.persist(derog);
        em.flush();
        return derog;
    }

    // ==================================================================
    // DerogTarifToProcessSearchFilter
    // ==================================================================

    @Test
    void toProcess_returnsNonDraftAssignedToEligibleUser() {
        persistDerog("BK-TP-1", DerogationStatus.SUBMITTED, collegue, conseiller);

        DerogTarifToProcessSearchFilter filter =
                new DerogTarifToProcessSearchFilter(Set.of(conseiller), conseiller, null);
        List<DerogationRequest> result = repository.findAll(filter.toSpec());

        assertThat(result).extracting(DerogationRequest::getBusinessKey).containsExactly("BK-TP-1");
    }

    @Test
    void toProcess_returnsOwnDraft() {
        persistDerog("BK-TP-DRAFT", DerogationStatus.DRAFT, conseiller, conseiller);

        DerogTarifToProcessSearchFilter filter =
                new DerogTarifToProcessSearchFilter(Set.of(conseiller), conseiller, null);

        assertThat(repository.findAll(filter.toSpec()))
                .extracting(DerogationRequest::getBusinessKey).containsExactly("BK-TP-DRAFT");
    }

    @Test
    void toProcess_excludesOthersDraft() {
        persistDerog("BK-TP-DRAFT-AUTRE", DerogationStatus.DRAFT, collegue, collegue);

        DerogTarifToProcessSearchFilter filter =
                new DerogTarifToProcessSearchFilter(Set.of(conseiller), conseiller, null);

        assertThat(repository.findAll(filter.toSpec())).isEmpty();
    }

    @Test
    void toProcess_excludesNonDraftAssignedToSomeoneElse() {
        persistDerog("BK-TP-AUTRE", DerogationStatus.SUBMITTED, collegue, collegue);

        DerogTarifToProcessSearchFilter filter =
                new DerogTarifToProcessSearchFilter(Set.of(conseiller), conseiller, null);

        assertThat(repository.findAll(filter.toSpec())).isEmpty();
    }

    @Test
    void toProcess_freeTextMatchesBusinessKey() {
        persistDerog("BK-TP-FT", DerogationStatus.SUBMITTED, collegue, conseiller);

        DerogTarifToProcessSearchFilter matching =
                new DerogTarifToProcessSearchFilter(Set.of(conseiller), conseiller, "BK-TP-FT");
        DerogTarifToProcessSearchFilter notMatching =
                new DerogTarifToProcessSearchFilter(Set.of(conseiller), conseiller, "ZZZZZ");

        assertThat(repository.findAll(matching.toSpec())).hasSize(1);
        assertThat(repository.findAll(notMatching.toSpec())).isEmpty();
    }

    @Test
    void toProcess_freeTextBlank_behavesLikeNoFilter() {
        persistDerog("BK-TP-BLANK", DerogationStatus.SUBMITTED, collegue, conseiller);

        DerogTarifToProcessSearchFilter filter =
                new DerogTarifToProcessSearchFilter(Set.of(conseiller), conseiller, "   ");

        assertThat(repository.findAll(filter.toSpec())).hasSize(1); // branche conjunction()
    }

    // ==================================================================
    // DerogTarifToFollowUpSearchFilter
    // ==================================================================

    @Test
    void followUp_returnsCaseWhereUserParticipatedBeforeAndIsNotCurrentAssignee() {
        // tâche 1 : assignée au conseiller (participation passée)
        DerogationRequest derog = persistDerog("BK-FU-1", DerogationStatus.SUBMITTED, conseiller, conseiller);
        // tâche 2 : assignée au collègue → devient la latestTask
        attachTask(derog, collegue);
        em.flush();

        DerogTarifToFollowUpSearchFilter filter =
                new DerogTarifToFollowUpSearchFilter(conseiller, null);

        assertThat(repository.findAll(filter.toSpec()))
                .extracting(DerogationRequest::getBusinessKey).containsExactly("BK-FU-1");
    }

    @Test
    void followUp_excludesCaseCurrentlyAssignedToUser() {
        persistDerog("BK-FU-MOI", DerogationStatus.SUBMITTED, conseiller, conseiller);

        DerogTarifToFollowUpSearchFilter filter =
                new DerogTarifToFollowUpSearchFilter(conseiller, null);

        assertThat(repository.findAll(filter.toSpec())).isEmpty();
    }

    @Test
    void followUp_excludesCaseUserNeverParticipatedIn() {
        persistDerog("BK-FU-JAMAIS", DerogationStatus.SUBMITTED, collegue, collegue);

        DerogTarifToFollowUpSearchFilter filter =
                new DerogTarifToFollowUpSearchFilter(conseiller, null);

        assertThat(repository.findAll(filter.toSpec())).isEmpty();
    }

    @Test
    void followUp_excludesNonFollowUpStatus() {
        // DRAFT n'est pas dans la liste des statuts follow-up
        DerogationRequest derog = persistDerog("BK-FU-DRAFT", DerogationStatus.DRAFT, conseiller, conseiller);
        attachTask(derog, collegue);
        em.flush();

        DerogTarifToFollowUpSearchFilter filter =
                new DerogTarifToFollowUpSearchFilter(conseiller, null);

        assertThat(repository.findAll(filter.toSpec())).isEmpty();
    }

    @Test
    void followUp_freeTextOnClientSubId() {
        DerogationRequest derog = persistDerog("BK-FU-FT", DerogationStatus.SUBMITTED, conseiller, conseiller);
        attachTask(derog, collegue);
        em.flush();

        DerogTarifToFollowUpSearchFilter matching =
                new DerogTarifToFollowUpSearchFilter(conseiller, "0406102");
        DerogTarifToFollowUpSearchFilter notMatching =
                new DerogTarifToFollowUpSearchFilter(conseiller, "introuvable");

        assertThat(repository.findAll(matching.toSpec())).hasSize(1);
        assertThat(repository.findAll(notMatching.toSpec())).isEmpty();
    }

    // ==================================================================
    // FinalizedDerogTarifSearchFilter
    // ==================================================================

    @Test
    void finalized_returnsApprovedCaseWhereUserWasAssigned() {
        persistDerog("BK-FIN-1", DerogationStatus.APPROVED, collegue, conseiller);

        FinalizedDerogTarifSearchFilter filter =
                new FinalizedDerogTarifSearchFilter(conseiller, null);

        assertThat(repository.findAll(filter.toSpec()))
                .extracting(DerogationRequest::getBusinessKey).containsExactly("BK-FIN-1");
    }

    @Test
    void finalized_excludesNonFinalStatus() {
        persistDerog("BK-FIN-SUB", DerogationStatus.SUBMITTED, collegue, conseiller);

        FinalizedDerogTarifSearchFilter filter =
                new FinalizedDerogTarifSearchFilter(conseiller, null);

        assertThat(repository.findAll(filter.toSpec())).isEmpty();
    }

    @Test
    void finalized_excludesCaseWhereUserWasNeverAssigned() {
        persistDerog("BK-FIN-AUTRE", DerogationStatus.APPROVED, collegue, collegue);

        FinalizedDerogTarifSearchFilter filter =
                new FinalizedDerogTarifSearchFilter(conseiller, null);

        assertThat(repository.findAll(filter.toSpec())).isEmpty();
    }

    @Test
    void finalized_coversAllFinalStatuses() {
        persistDerog("BK-FIN-REJ", DerogationStatus.REJECTED, collegue, conseiller);
        persistDerog("BK-FIN-CLO", DerogationStatus.CLOSED, collegue, conseiller);

        FinalizedDerogTarifSearchFilter filter =
                new FinalizedDerogTarifSearchFilter(conseiller, null);

        assertThat(repository.findAll(filter.toSpec()))
                .extracting(DerogationRequest::getBusinessKey)
                .containsExactlyInAnyOrder("BK-FIN-REJ", "BK-FIN-CLO");
    }

    @Test
    void finalized_freeTextOnAgency() {
        persistDerog("BK-FIN-FT", DerogationStatus.APPROVED, collegue, conseiller);

        FinalizedDerogTarifSearchFilter matching =
                new FinalizedDerogTarifSearchFilter(conseiller, "casa");
        FinalizedDerogTarifSearchFilter notMatching =
                new FinalizedDerogTarifSearchFilter(conseiller, "rabat");

        assertThat(repository.findAll(matching.toSpec())).hasSize(1); // like lower() → insensible à la casse
        assertThat(repository.findAll(notMatching.toSpec())).isEmpty();
    }
}

package com.bnpparibas.irb.qlickflow.wfdtrp.mapper.referentiel;
// ⚠️ TODO : ajuster ce package pour qu'il corresponde au package des interfaces @Mapper
// (mapper.referentiel d'après le rapport JaCoCo).

import com.bnpparibas.irb.qlickflow.wfdtrp.dto.DeviseDTO;
import com.bnpparibas.irb.qlickflow.wfdtrp.dto.MotifDerogationDTO;
import com.bnpparibas.irb.qlickflow.wfdtrp.dto.PackageCommissionDTO;
import com.bnpparibas.irb.qlickflow.wfdtrp.dto.SegmentDTO;
import com.bnpparibas.irb.qlickflow.wfdtrp.entities.referentiel.Devise;
import com.bnpparibas.irb.qlickflow.wfdtrp.entities.referentiel.MotifDerogation;
import com.bnpparibas.irb.qlickflow.wfdtrp.entities.referentiel.PackageCommission;
import com.bnpparibas.irb.qlickflow.wfdtrp.entities.referentiel.Segment;

import org.junit.jupiter.api.Test;
import org.mapstruct.factory.Mappers;

import java.util.List;

import static org.assertj.core.api.Assertions.assertThat;

/**
 * Mappers MapStruct (@Mapper componentModel="spring") : on teste les implémentations
 * générées (XxxMapperImpl) via Mappers.getMapper — pas besoin de contexte Spring.
 * Si Mappers.getMapper pose problème, remplacer par : new DeviseMapperImpl() etc.
 */
class ReferentielMappersTest {

    private final DeviseMapper deviseMapper = Mappers.getMapper(DeviseMapper.class);
    private final MotifDerogationMapper motifMapper = Mappers.getMapper(MotifDerogationMapper.class);
    private final PackageCommissionMapper packageMapper = Mappers.getMapper(PackageCommissionMapper.class);
    private final SegmentMapper segmentMapper = Mappers.getMapper(SegmentMapper.class);

    // ================= DeviseMapper =================

    @Test
    void devise_toDto_mapsCodeAndLibelle() {
        DeviseDTO dto = deviseMapper.toDto(new Devise("MAD", "Dirham marocain"));

        assertThat(dto.getCode()).isEqualTo("MAD");
        assertThat(dto.getLibelle()).isEqualTo("Dirham marocain");
    }

    @Test
    void devise_toDto_null_returnsNull() {
        assertThat(deviseMapper.toDto(null)).isNull();
    }

    @Test
    void devise_toEntity_mapsCodeAndLibelle_actifIgnored() {
        DeviseDTO dto = DeviseDTO.builder().code("EUR").libelle("Euro").build();

        Devise entity = deviseMapper.toEntity(dto);

        assertThat(entity.getCode()).isEqualTo("EUR");
        assertThat(entity.getLibelle()).isEqualTo("Euro");
        // @Mapping(target="actif", ignore=true) → on n'asserte pas sa valeur
    }

    @Test
    void devise_toEntity_null_returnsNull() {
        assertThat(deviseMapper.toEntity(null)).isNull();
    }

    // ================= MotifDerogationMapper =================

    @Test
    void motif_toDto_mapsCodeAndLibelle() {
        MotifDerogationDTO dto = motifMapper.toDto(new MotifDerogation("M1", "Motif un"));

        assertThat(dto.getCode()).isEqualTo("M1");
        assertThat(dto.getLibelle()).isEqualTo("Motif un");
    }

    @Test
    void motif_toDto_null_returnsNull() {
        assertThat(motifMapper.toDto(null)).isNull();
    }

    @Test
    void motif_toEntity_mapsFields() {
        MotifDerogationDTO dto = MotifDerogationDTO.builder().code("M2").libelle("Motif deux").build();

        MotifDerogation entity = motifMapper.toEntity(dto);

        assertThat(entity.getCode()).isEqualTo("M2");
        assertThat(entity.getLibelle()).isEqualTo("Motif deux");
    }

    // ================= PackageCommissionMapper =================

    @Test
    void packageCommission_toDto_mapsFieldsIncludingCodes() {
        PackageCommission entity = new PackageCommission("PACK1", "Package 1", List.of("C1", "C2"));

        PackageCommissionDTO dto = packageMapper.toDto(entity);

        assertThat(dto.getCode()).isEqualTo("PACK1");
        assertThat(dto.getLibelle()).isEqualTo("Package 1");
        assertThat(dto.getCodesCommission()).containsExactly("C1", "C2");
    }

    @Test
    void packageCommission_toDto_null_returnsNull() {
        assertThat(packageMapper.toDto(null)).isNull();
    }

    @Test
    void packageCommission_toEntity_mapsFields() {
        PackageCommissionDTO dto = PackageCommissionDTO.builder()
                .code("PACK2").libelle("Package 2")
                .codesCommission(List.of("C3"))
                .build();

        PackageCommission entity = packageMapper.toEntity(dto);

        assertThat(entity.getCode()).isEqualTo("PACK2");
        assertThat(entity.getCodesCommission()).containsExactly("C3");
    }

    // ================= SegmentMapper =================

    @Test
    void segment_toDto_mapsCodeAndLibelle() {
        SegmentDTO dto = segmentMapper.toDto(new Segment("GRP", "Grand public"));

        assertThat(dto.getCode()).isEqualTo("GRP");
        assertThat(dto.getLibelle()).isEqualTo("Grand public");
    }

    @Test
    void segment_toDto_null_returnsNull() {
        assertThat(segmentMapper.toDto(null)).isNull();
    }

    @Test
    void segment_toEntity_mapsFields() {
        SegmentDTO dto = SegmentDTO.builder().code("PRE").libelle("Premium").build();

        Segment entity = segmentMapper.toEntity(dto);

        assertThat(entity.getCode()).isEqualTo("PRE");
        assertThat(entity.getLibelle()).isEqualTo("Premium");
    }
}

server:
  port: 0

spring:
  application:
    name: Qlickflow - DTRP Workflow (TEST)

  datasource:
    # MODE=PostgreSQL : compatibilité avec columnDefinition = "uuid" et la syntaxe PG
    # Si erreur sur la colonne "package" (dtrp_derog_requests), ajouter ;NON_KEYWORDS=PACKAGE
    url: jdbc:h2:mem:qlickflow;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  flyway:
    # Les migrations sont écrites pour PostgreSQL → on les désactive sur H2,
    # c'est Hibernate qui génère le schéma (y compris les tables _AUD d'Envers)
    enabled: false

  jpa:
    hibernate:
      ddl-auto: create-drop   # remplace "validate" de la prod
    show-sql: false
    properties:
      hibernate:
        format_sql: false
      # Configuration Envers identique à la prod pour que les tables _AUD
      # soient générées avec les mêmes noms
      org:
        hibernate:
          envers:
            audit_table_suffix: _AUD
            revision_field_name: REV
            revision_type_field_name: REVTYPE
            store_data_at_delete: true

  cloud:
    vault:
      enabled: false

# Sécurité en mode mock comme en local
qf:
  security:
    auth-mode: mock
    public-endpoints:
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /actuator/**
      - /error
      - /favicon.ico

# Désactiver le cron de sync Camunda pendant les tests
# (la propriété pilotant @Scheduled fixedDelayString="${wf.task.sync.fixedDelay:5000}"
#  ne peut pas être désactivée par valeur — si un test charge le contexte complet,
#  préférer @MockBean TaskSyncCronJob ou exclure le bean)
wf:
  task:
    sync:
      fixedDelay: 2147483647   # ~24 jours : le cron ne tournera jamais pendant un test

# Outbox : valeurs minimales si un slice de contexte les exige
outbox:
  node-id: test-node
  polling-enabled: false
  recovery-enabled: false

logging:
  level:
    root: warn
    org.hibernate.SQL: warn


